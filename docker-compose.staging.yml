# Docker Compose configuration for staging environment
version: '3.8'

services:
  maas-api:
    image: ${IMAGE_TAG:-vortex.kronshtadt.ru:8443/maas-proxy/maas-prod-stl:latest}
    ports:
      - "7001:7000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - ENVIRONMENT=staging
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - maas-network

  # Optional: Add monitoring service
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - maas-network
    profiles:
      - monitoring

networks:
  maas-network:
    driver: bridge

volumes:
  logs:
  uploads:
