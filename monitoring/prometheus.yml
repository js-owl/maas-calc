# Prometheus configuration for Manufacturing Calculation API monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'maas-api'
    static_configs:
      - targets: ['maas-api:7000']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Health check endpoint
  - job_name: 'maas-api-health'
    static_configs:
      - targets: ['maas-api:7000']
    metrics_path: '/health'
    scrape_interval: 60s
    scrape_timeout: 5s

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093
