services:
  backend-calc:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: backend-calc
    # ports:
      # - "7000:7000"
    environment:
      - CORS_ORIGINS=["*"]
      - CORS_ALLOW_CREDENTIALS=true
      - CORS_ALLOW_METHODS=["*"]
      - CORS_ALLOW_HEADERS=["*"]
      - PYTHONPATH=/app
    volumes:
      - .:/app
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "7000", "--reload"]
    networks:
      - maas-shared

networks:
  maas-shared:
    external: true

volumes:
  uploads:
  logs:
